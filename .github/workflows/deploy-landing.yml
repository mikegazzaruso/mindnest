name: Deploy Landing

on:
  push:
    branches: [main]
    paths:
      - "apps/landing/**"
      - ".github/workflows/deploy-landing.yml"
  workflow_dispatch:

concurrency:
  group: deploy-landing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build image & deploy to forge
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v6
        with:
          context: apps/landing
          push: true
          tags: ghcr.io/mikegazzaruso/nestbrain-landing:latest

      - name: Deploy on forge via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: forge.gazzaruso.com
          username: mike
          key: ${{ secrets.FORGE_SSH_KEY }}
          script: |
            cd /home/mike/docker/landing
            docker compose pull
            docker compose up -d
            docker image prune -f
